    function renderMissions() {
      const missions = buildMissions();
      return missions.map(mission => `
        <button class="mission-button" data-start="${mission.type}" data-target="${escapeHtml(mission.id)}">
          <strong>${escapeHtml(mission.title)}</strong>
          <span>${escapeHtml(mission.subtitle)}</span>
        </button>
      `).join("");
    }

    function buildMissions() {
      const ayahMissions = Object.values(state.ayat)
        .filter(item => state.sections[String(item.sectionId)].unlocked)
        .map(item => ({ item, status: getDueStatus(item), weight: statusWeight(getDueStatus(item)) }))
        .filter(row => row.weight > 0)
        .sort((a, b) => b.weight - a.weight || a.item.ayahNumber - b.item.ayahNumber)
        .slice(0, 3)
        .map(row => ({
          type: "ayah",
          id: row.item.ayahNumber,
          title: `Review Ayah ${row.item.ayahNumber}`,
          subtitle: `${statusLabel(row.status)} / ${row.item.retention}% / ${formatDue(row.item)}`
        }));

      if (ayahMissions.length) return ayahMissions;

      const blockDue = Object.values(state.blocks)
        .filter(item => state.sections[String(item.sectionId)].unlocked)
        .map(item => ({ item, status: getDueStatus(item), weight: statusWeight(getDueStatus(item)) }))
        .filter(row => row.weight > 0)
        .sort((a, b) => b.weight - a.weight)
        .slice(0, 2)
        .map(row => ({
          type: "block",
          id: row.item.id,
          title: `Recite Block ${row.item.id}`,
          subtitle: `${statusLabel(row.status)} / ${row.item.retention}% / ${formatDue(row.item)}`
        }));

      if (blockDue.length) return blockDue;

      const next = Object.values(state.ayat)
        .filter(item => state.sections[String(item.sectionId)].unlocked && item.stageIndex < 0)
        .sort((a, b) => a.ayahNumber - b.ayahNumber)[0];

      return next ? [{
        type: "ayah",
        id: next.ayahNumber,
        title: `Begin Ayah ${next.ayahNumber}`,
        subtitle: "First clean recall starts the ladder"
      }] : [{
        type: "block",
        id: "1-7",
        title: "Preserve current campaign",
        subtitle: "No urgent reviews"
      }];
    }

    function renderAtRisk() {
      const items = Object.values(state.ayat)
        .filter(item => ["overdue", "decay_risk"].includes(getDueStatus(item)))
        .sort((a, b) => a.ayahNumber - b.ayahNumber)
        .slice(0, 4);
      if (!items.length) return `<div class="mini-item"><strong>No active risk</strong><span>Due reviews will appear here.</span></div>`;
      return items.map(item => `<div class="mini-item"><strong>Ayah ${item.ayahNumber}</strong><span>${statusLabel(getDueStatus(item))} / ${formatDue(item)}</span></div>`).join("");
    }

    function renderMilestone() {
      const current = state.sections[String(ui.selectedSectionId)];
      const next = state.sections[String(ui.selectedSectionId + 1)];
      if (!next) return `<div class="mini-item"><strong>Final zone</strong><span>Preserve retention over time.</span></div>`;
      const remaining = Math.max(0, state.settings.sectionUnlockThreshold - current.retention);
      return `<div class="mini-item"><strong>Unlock Section ${next.id} - ${escapeHtml(next.name)}</strong><span>${remaining}% retention needed in Section ${current.id}.</span></div>`;
    }

    function renderAchievements() {
      const names = ["First Lock", "Same-Day Hold", "1-Day Hold", "3-Day Hold", "7-Day Hold", "30-Day Hold", "Deep Retention", "First Block Stabilized", "First Section Unlock"];
      return names.map(name => {
        const unlocked = state.unlockedAchievements.includes(name);
        return `<div class="mini-item"><strong>${unlocked ? "Unlocked" : "Locked"} / ${escapeHtml(name)}</strong><span>${unlocked ? "Retention milestone reached" : "Awaiting recall proof"}</span></div>`;
      }).join("");
    }

    function statusWeight(status) {
      return { decay_risk: 5, overdue: 4, due_now: 3, due_soon: 2 }[status] || 0;
    }

    function statusLabel(status) {
      return ({
        not_started: "Not started",
        future: "Stable",
        due_soon: "Due soon",
        due_now: "Due now",
        overdue: "Overdue",
        decay_risk: "Decay risk"
      })[status] || status;
    }

    function range(start, end) {
      return Array.from({ length: end - start + 1 }, (_, index) => start + index);
    }

    function formatReps(reps) {
      return `${reps} ${reps === 1 ? "rep" : "reps"}`;
    }

    function getBlockReps(block) {
      return Math.max(0, Math.min(999, Number(block.reps || 0)));
    }

    function getAyahReps(ayah) {
      return Math.max(0, Math.min(999, Number(ayah.reps || 0)));
    }

    function getBlockRepTarget(block) {
      const target = Number(block.repTarget || 100);
      if (!Number.isFinite(target)) return 100;
      return Math.max(1, Math.min(999, Math.round(target)));
    }

    function getAllOrderedBlocks() {
      return BLOCKS.map(block => state.blocks[block.id]).filter(Boolean);
    }

    function getAyatForBlock(block) {
      return range(block.ayahRange[0], block.ayahRange[1]).map(ayah => state.ayat[String(ayah)]).filter(Boolean);
    }

    function getWeakestAyah(block) {
      const ayat = getAyatForBlock(block);
      if (!ayat.length) return null;
      return ayat.reduce((weakest, ayah) => (ayah.retention || 0) < (weakest.retention || 0) ? ayah : weakest, ayat[0]);
    }

    function getBlockAyahAverage(block) {
      const ayat = getAyatForBlock(block);
      if (!ayat.length) return 0;
      return Math.round(ayat.reduce((sum, ayah) => sum + (ayah.retention || 0), 0) / ayat.length);
    }

    function getBlockDisplayRetention(block) {
      const weakest = getWeakestAyah(block);
      if (!weakest) return block.retention || 0;
      return Math.min(block.retention || 0, weakest.retention || 0);
    }

    function getWorstRecallStatus(items) {
      return items
        .map(item => getDueStatus(item))
        .sort((a, b) => statusWeight(b) - statusWeight(a))[0] || "not_started";
    }

    function getBlockCombinedStatus(block) {
      return getWorstRecallStatus([block, ...getAyatForBlock(block)]);
    }

    function getItemColorState(item) {
      const status = getDueStatus(item);
      if ((item.stageIndex ?? -1) < 0 || !(item.retention || 0)) return "state-new";
      if (status === "due_soon") return "state-soon";
      if (["due_now", "overdue", "decay_risk"].includes(status)) return "state-needed";
      return "state-stable";
    }

    function getBlockColorState(block) {
      const status = getBlockCombinedStatus(block);
      if (!getBlockDisplayRetention(block)) return "state-new";
      if (status === "due_soon") return "state-soon";
      if (["due_now", "overdue", "decay_risk"].includes(status)) return "state-needed";
      return "state-stable";
    }

    function getRecallRows(type, statuses) {
      const items = type === "ayah" ? Object.values(state.ayat) : getAllOrderedBlocks();
      return items
        .filter(item => state.sections[String(item.sectionId)]?.unlocked)
        .map(item => ({ type, item, status: getDueStatus(item), weight: statusWeight(getDueStatus(item)) }))
        .filter(row => statuses.includes(row.status))
        .sort((a, b) => b.weight - a.weight || compareRecallOrder(a, b));
    }

    function compareRecallOrder(a, b) {
      if (a.type === "ayah") return a.item.ayahNumber - b.item.ayahNumber;
      return BLOCKS.findIndex(block => block.id === a.item.id) - BLOCKS.findIndex(block => block.id === b.item.id);
    }

    function changeBlockReps(blockId, delta) {
      const block = state.blocks[blockId];
      block.reps = Math.max(0, Math.min(999, getBlockReps(block) + Number(delta)));
      block.lastAttemptAt = new Date().toISOString();
      saveState();
      render();
    }

    function changeAyahReps(ayahNumber, delta) {
      const ayah = state.ayat[String(ayahNumber)];
      ayah.reps = Math.max(0, Math.min(999, getAyahReps(ayah) + Number(delta)));
      ayah.lastAttemptAt = new Date().toISOString();
      saveState();
      render();
    }

    function editBlockRepTarget(blockId) {
      const block = state.blocks[blockId];
      const current = getBlockRepTarget(block);
      const input = prompt("Set repetition target", String(current));
      if (input === null) return;
      const next = Number(input);
      if (!Number.isFinite(next) || next <= 0) {
        alert("Please enter a number between 1 and 999.");
        return;
      }
      block.repTarget = Math.max(1, Math.min(999, Math.round(next)));
      saveState();
      render();
    }

    function markBlockMemorized(blockId) {
      recordBlockRecall(blockId, "perfect");
    }

    function markAyahMemorized(ayahNumber) {
      recordAttempt("ayah", ayahNumber, "perfect");
    }

    function recordBlockRecall(blockId, result) {
      const block = state.blocks[blockId];
      const now = Date.now();
      const previousUnlocked = unlockedSectionIds();
      const previousRetention = block.retention || 0;
      const priorDueStatus = getDueStatus(block);
      let outcome;
      if (result === "perfect") outcome = applyPerfectRecall(block, now);
      if (result === "minor") outcome = applyMinorHesitation(block, now);
      if (result === "cue") outcome = applyNeededCue(block, now);
      if (result === "failed") outcome = applyFailedRecall(block, now);
      if (result === "perfect") {
        block.reps = Math.max(getBlockReps(block), 1);
        recordImplicitAyahSuccess(block, now);
      }
      block.attempts = Array.isArray(block.attempts) ? block.attempts : [];
      block.attempts.push({
        targetType: "block",
        targetId: blockId,
        result,
        attemptedAt: new Date(now).toISOString(),
        previousRetention,
        newRetention: block.retention || 0,
        advanced: outcome.advanced
      });
      if (result === "perfect" && ["due_soon", "due_now", "overdue", "decay_risk"].includes(priorDueStatus)) {
        updateStreak();
      }
      recalculate(state);
      updateAchievements();
      saveState();
      const newlyUnlocked = unlockedSectionIds().filter(id => !previousUnlocked.includes(id));
      ui.lastMessage = buildAttemptMessage(outcome, block, newlyUnlocked);
      render();
    }

    function resetBlock(blockId) {
      if (!confirm("Reset this block's repetitions and block retention?")) return;
      clearBlockMemory(blockId, true);
    }

    function unmemorizeBlock(blockId) {
      clearBlockMemory(blockId, false);
    }

    function toggleBlockMemorized(blockId) {
      const block = state.blocks[blockId];
      if ((block.stageIndex ?? -1) >= 0) {
        unmemorizeBlock(blockId);
        return;
      }
      markBlockMemorized(blockId);
    }

    function unmemorizeAyah(ayahNumber) {
      clearAyahMemory(ayahNumber, false);
    }

    function toggleAyahMemorized(ayahNumber) {
      const ayah = state.ayat[String(ayahNumber)];
      if ((ayah.stageIndex ?? -1) >= 0) {
        unmemorizeAyah(ayahNumber);
        return;
      }
      markAyahMemorized(ayahNumber);
    }

    function clearBlockMemory(blockId, includeReps) {
      const block = state.blocks[blockId];
      if (includeReps) block.reps = 0;
      block.retention = 0;
      block.stageIndex = -1;
      block.stageName = "Not started";
      block.firstLockedAt = null;
      block.lastSuccessfulRecallAt = null;
      block.nextDueAt = null;
      block.lastResult = null;
      block.lastAttemptAt = null;
      block.weak = false;
      block.attempts = [];
      recalculate(state);
      saveState();
      render();
    }

    function clearAyahMemory(ayahNumber, includeReps) {
      const ayah = state.ayat[String(ayahNumber)];
      if (includeReps) ayah.reps = 0;
      ayah.retention = 0;
      ayah.stageIndex = -1;
      ayah.stageName = "Not started";
      ayah.firstLockedAt = null;
      ayah.lastSuccessfulRecallAt = null;
      ayah.nextDueAt = null;
      ayah.lastResult = null;
      ayah.lastAttemptAt = null;
      ayah.weak = false;
      ayah.attempts = [];
      recalculate(state);
      saveState();
      render();
    }

    function toggleAyahText(button) {
      const row = button.closest(".ayah-repair-row");
      const text = row?.querySelector(`[data-ayah-text="${button.dataset.ayahToggle}"]`);
      if (!text) return;
      const willShow = text.classList.contains("hidden");
      text.classList.toggle("hidden", !willShow);
      button.classList.toggle("open", willShow);
      button.textContent = willShow ? "Hide ayah" : "Show ayah";
    }

    // EVENT HANDLERS
    function bindEvents() {
      document.querySelectorAll("[data-tab]").forEach(button => {
        button.addEventListener("click", () => {
          ui.activeTab = button.dataset.tab;
          ui.currentBlockId = null;
          render();
        });
      });

      document.querySelectorAll("[data-open-block]").forEach(button => {
        button.addEventListener("click", () => {
          ui.currentBlockId = button.dataset.openBlock;
          render();
        });
      });

      document.querySelectorAll("[data-main]").forEach(button => {
        button.addEventListener("click", () => {
          ui.currentBlockId = null;
          render();
        });
      });

      document.querySelectorAll("[data-rep]").forEach(button => {
        button.addEventListener("click", () => changeBlockReps(button.dataset.rep, button.dataset.delta));
      });

      document.querySelectorAll("[data-ayah-rep]").forEach(button => {
        button.addEventListener("click", () => changeAyahReps(button.dataset.ayahRep, button.dataset.delta));
      });

      document.querySelectorAll("[data-edit-target]").forEach(button => {
        button.addEventListener("click", () => editBlockRepTarget(button.dataset.editTarget));
      });

      document.querySelectorAll("[data-memory-toggle]").forEach(button => {
        button.addEventListener("click", () => toggleBlockMemorized(button.dataset.memoryToggle));
      });

      document.querySelectorAll("[data-ayah-memory-toggle]").forEach(button => {
        button.addEventListener("click", () => toggleAyahMemorized(button.dataset.ayahMemoryToggle));
      });

      document.querySelectorAll("[data-ayah-toggle]").forEach(button => {
        button.addEventListener("click", () => toggleAyahText(button));
      });

      document.querySelectorAll("[data-block-result]").forEach(button => {
        button.addEventListener("click", () => recordBlockRecall(button.dataset.blockResult, button.dataset.result));
      });

      document.querySelectorAll("[data-reset-block]").forEach(button => {
        button.addEventListener("click", () => resetBlock(button.dataset.resetBlock));
      });

      document.querySelectorAll("[data-section]").forEach(button => {
        button.addEventListener("click", () => {
          const sectionId = Number(button.dataset.section);
          const section = state.sections[String(sectionId)];
          if (!section.unlocked) return;
          ui.selectedSectionId = sectionId;
          const firstBlock = Object.values(state.blocks).find(block => block.sectionId === sectionId);
          ui.selectedBlockId = firstBlock.id;
          ui.selectedAyah = firstBlock.ayahRange[0];
          ui.lastMessage = "";
          render();
        });
      });

      document.querySelectorAll("[data-block]").forEach(button => {
        button.addEventListener("click", () => {
          ui.selectedBlockId = button.dataset.block;
          const block = state.blocks[ui.selectedBlockId];
          ui.selectedAyah = block.ayahRange[0];
          ui.lastMessage = "";
          render();
        });
      });

      document.querySelectorAll("[data-ayah]").forEach(button => {
        button.addEventListener("click", () => {
          ui.selectedAyah = Number(button.dataset.ayah);
          ui.lastMessage = "";
          render();
        });
      });

      document.querySelectorAll("[data-ayah-ref]").forEach(button => {
        button.addEventListener("click", () => {
          const ayahNumber = Number(button.dataset.ayahRef);
          const ayah = state.ayat[String(ayahNumber)];
          const section = state.sections[String(ayah.sectionId)];
          if (!section.unlocked) return;
          ui.selectedSectionId = ayah.sectionId;
          ui.selectedBlockId = ayah.blockId;
          ui.selectedAyah = ayahNumber;
          ui.lastMessage = "";
          render();
        });
      });

      document.querySelectorAll("[data-start]").forEach(button => {
        button.addEventListener("click", () => openChallenge(button.dataset.start, button.dataset.target));
      });

      document.querySelectorAll("[data-export]").forEach(button => button.addEventListener("click", exportProgress));
      document.querySelectorAll("[data-import]").forEach(input => input.addEventListener("change", importProgress));
      document.querySelectorAll("[data-reset]").forEach(button => button.addEventListener("click", resetCampaign));
    }

    function openChallenge(type, targetId) {
      ui.challengeTarget = { type, targetId };
      ui.challengeCue = "number";
      renderChallenge();
    }

    function closeChallenge() {
      ui.challengeTarget = null;
      const modal = document.getElementById("challengeModal");
      modal.classList.remove("active");
      modal.setAttribute("aria-hidden", "true");
    }

    function renderChallenge() {
      const modal = document.getElementById("challengeModal");
      const target = ui.challengeTarget;
      if (!target) return closeChallenge();
      const item = target.type === "ayah" ? state.ayat[String(target.targetId)] : state.blocks[target.targetId];
      const title = target.type === "ayah" ? `Ayah ${item.ayahNumber}` : `Block ${item.id}`;
      const nextStage = RETENTION_STAGES[Math.min((item.stageIndex ?? -1) + 1, RETENTION_STAGES.length - 1)];
      const cue = renderCue(target.type, item);

      modal.innerHTML = `
        <div class="challenge" role="dialog" aria-modal="true">
          <div class="challenge-header">
            <div>
              <div class="eyebrow">Recall Challenge</div>
              <h2>${escapeHtml(title)}</h2>
            </div>
            <button class="close-btn" data-close aria-label="Close">×</button>
          </div>
          <div class="challenge-body">
            <div class="detail-grid">
              ${detailCell("Current Stage", item.stageName || "Not started")}
              ${detailCell("Current Retention", `${item.retention || 0}%`)}
              ${detailCell("Next Milestone", nextStage ? `${nextStage.name} / ${nextStage.retention}%` : "Complete")}
              ${detailCell("Timing", timingMessage(item, nextStage))}
            </div>
            <div class="action-row">
              <button class="secondary-action" data-cue="number">Ayah number only</button>
              <button class="secondary-action" data-cue="first">First-word cue</button>
            </div>
            ${cue}
            <div class="result-grid">
              <button class="result-action perfect" data-result="perfect">Perfect</button>
              <button class="result-action minor" data-result="minor">Minor Hesitation</button>
              <button class="result-action cue" data-result="cue">Needed Cue</button>
              <button class="result-action failed" data-result="failed">Failed</button>
            </div>
            <div id="challengeResult" class="notice"></div>
          </div>
        </div>
      `;

      modal.classList.add("active");
      modal.setAttribute("aria-hidden", "false");
      modal.querySelector("[data-close]").addEventListener("click", closeChallenge);
      modal.querySelectorAll("[data-cue]").forEach(button => {
        button.addEventListener("click", () => {
          ui.challengeCue = button.dataset.cue;
          renderChallenge();
        });
      });
      modal.querySelectorAll("[data-result]").forEach(button => {
        button.addEventListener("click", () => recordAttempt(target.type, target.targetId, button.dataset.result));
      });
    }

    function renderCue(type, item) {
      if (type === "block") {
        if (ui.challengeCue === "first") {
          const words = range(item.ayahRange[0], item.ayahRange[1]).map(ayah => `${ayah}: ${AYAH_FIRST_WORDS[ayah] || "-"}`).join(" / ");
          return `<div class="cue-box"><div><div class="cue-label">First words</div><div class="cue-main cue-arabic">${escapeHtml(words)}</div></div></div>`;
        }
        return `<div class="cue-box"><div><div class="cue-label">Blank flow recall</div><div class="cue-main">Ayat ${item.ayahRange[0]}-${item.ayahRange[1]}</div></div></div>`;
      }

      if (ui.challengeCue === "first") {
        return `<div class="cue-box"><div><div class="cue-label">First-word cue</div><div class="cue-main cue-arabic">${escapeHtml(AYAH_FIRST_WORDS[item.ayahNumber] || "Unavailable")}</div></div></div>`;
      }
      return `<div class="cue-box"><div><div class="cue-label">Ayah number only</div><div class="cue-main">Ayah ${item.ayahNumber}</div></div></div>`;
    }

    function timingMessage(item, nextStage) {
      if (!nextStage) return "Complete";
      if (!item.lastSuccessfulRecallAt) return "Eligible now";
      const elapsed = Date.now() - new Date(item.lastSuccessfulRecallAt).getTime();
      const remaining = nextStage.minDelayMs - elapsed;
      if (remaining <= 0) return "Eligible now";
      if (remaining < 60 * 60 * 1000) return `${Math.ceil(remaining / (60 * 1000))}m until advancement`;
      if (remaining < DAY) return `${Math.ceil(remaining / (60 * 60 * 1000))}h until advancement`;
      return `${Math.ceil(remaining / DAY)}d until advancement`;
    }

    function renderChallengeResult(outcome, item, newlyUnlocked) {
      const target = ui.challengeTarget;
      renderChallenge();
      const box = document.getElementById("challengeResult");
      if (!box) return;
      const unlockText = newlyUnlocked.length ? ` Section ${newlyUnlocked[0]} unlocked.` : "";
      box.innerHTML = `
        <div>${escapeHtml(outcome.advanced ? "Advanced" : "Recorded")}: ${item.retention || 0}% / ${escapeHtml(item.stageName || "Not started")}. Next review: ${escapeHtml(formatDue(item))}.${escapeHtml(unlockText)}</div>
        ${renderReferenceText(target.type, item)}
      `;
      box.classList.add("active");
    }

    function renderReferenceText(type, item) {
      if (type === "ayah") {
        return `<div class="reference-text"><span>Ayah ${item.ayahNumber}</span>${escapeHtml(AYAH_TEXT[item.ayahNumber] || "")}</div>`;
      }
      return `<div class="reference-text">${range(item.ayahRange[0], item.ayahRange[1]).map(ayah => `<p><span>${ayah}</span>${escapeHtml(AYAH_TEXT[ayah] || "")}</p>`).join("")}</div>`;
    }

    // EXPORT IMPORT
    function exportProgress() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "surah-al-hajj-progress.json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function importProgress(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          if (!confirm("Replace current campaign progress with this backup?")) return;
          state = recalculate(mergeWithInitial(parsed));
          saveState();
          ui.activeTab = "today";
          ui.currentBlockId = null;
          ui.selectedSectionId = 1;
          ui.selectedBlockId = "1-7";
          ui.selectedAyah = 1;
          ui.lastMessage = "Progress imported.";
          render();
        } catch (error) {
          alert("Could not import this JSON file.");
        }
      };
      reader.readAsText(file);
      event.target.value = "";
    }

    function resetCampaign() {
      if (!confirm("Reset all Surah Al-Hajj campaign progress on this browser?")) return;
      state = createInitialState();
      saveState();
      ui = {
        activeTab: "today",
        currentBlockId: null,
        selectedSectionId: 1,
        selectedBlockId: "1-7",
        selectedAyah: 1,
        challengeTarget: null,
        challengeCue: "number",
        lastMessage: "Campaign reset."
      };
      closeChallenge();
      render();
    }

    // INIT
    state = loadState();
    render();
  </script>
</body>
</html>
