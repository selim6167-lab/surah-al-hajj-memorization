<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surah Al-Hajj - Memorization Campaign</title>
  <style>
    :root {
      --bg: #05070a;
      --bg-2: #0b1117;
      --ink: #f5f2e8;
      --muted: #9fa8ac;
      --dim: #566066;
      --line: rgba(224, 189, 105, 0.23);
      --gold: #e0bd69;
      --gold-2: #fff0a8;
      --cyan: #52d6dc;
      --orange: #ff9a55;
      --red: #ff5d5d;
      --emerald: #64d794;
      --panel: rgba(15, 20, 24, 0.78);
      --panel-strong: rgba(18, 25, 30, 0.94);
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.48);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 8%, rgba(82, 214, 220, 0.14), transparent 25%),
        radial-gradient(circle at 84% 14%, rgba(224, 189, 105, 0.14), transparent 26%),
        linear-gradient(135deg, #030405 0%, #0a1112 45%, #060806 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.32;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent 86%);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      width: min(1820px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 34px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .brand-panel {
      position: relative;
      overflow: hidden;
      min-height: 168px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(115deg, rgba(224, 189, 105, 0.12), transparent 34%),
        linear-gradient(155deg, rgba(82, 214, 220, 0.12), transparent 44%),
        var(--panel);
      box-shadow: var(--shadow);
    }

    .brand-panel::after {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      pointer-events: none;
    }

    .eyebrow {
      color: var(--cyan);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 920px;
      margin: 10px 0 16px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.1rem, 5vw, 4.9rem);
      line-height: 0.94;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 880px;
      margin: 0;
      color: #c5c3b6;
      font-size: 1rem;
      line-height: 1.6;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 10px;
      min-width: min(720px, 44vw);
    }

    .metric {
      min-height: 78px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      background: rgba(8, 12, 14, 0.72);
      box-shadow: inset 0 0 26px rgba(255,255,255,0.018);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      color: var(--ink);
      font-size: 1.35rem;
      line-height: 1.1;
    }

    .layout {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr) 340px;
      gap: 14px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 15px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .panel-title {
      margin: 0;
      color: var(--gold-2);
      font-size: 0.85rem;
      font-weight: 900;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .panel-body {
      padding: 16px;
    }

    .section-list {
      display: grid;
      gap: 12px;
    }

    .section-card {
      width: 100%;
      padding: 14px;
      color: var(--ink);
      text-align: left;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.05), transparent),
        rgba(7, 11, 13, 0.85);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .section-card:not(:disabled):hover,
    .section-card.active {
      transform: translateY(-2px);
      border-color: rgba(224, 189, 105, 0.62);
      box-shadow: 0 16px 38px rgba(0,0,0,0.28), 0 0 30px rgba(224,189,105,0.08);
    }

    .section-card.locked {
      opacity: 0.58;
      filter: saturate(0.72);
    }

    .section-head {
      display: grid;
      grid-template-columns: 44px 1fr 58px;
      gap: 11px;
      align-items: center;
    }

    .section-mark,
    .node-ring,
    .compact-ring {
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: conic-gradient(var(--gold) var(--ring, 0%), rgba(255,255,255,0.1) 0);
    }

    .section-mark {
      width: 44px;
      height: 44px;
      color: #10100a;
      font-weight: 950;
      box-shadow: 0 0 20px rgba(224,189,105,0.12);
    }

    .section-mark::before,
    .node-ring::before,
    .compact-ring::before {
      content: attr(data-label);
      display: grid;
      place-items: center;
      width: calc(100% - 8px);
      height: calc(100% - 8px);
      border-radius: inherit;
      background: #101519;
      color: var(--ink);
    }

    .section-name {
      display: block;
      font-size: 1rem;
      font-weight: 900;
    }

    .section-meta {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .lock-state {
      justify-self: end;
      padding: 6px 8px;
      color: var(--cyan);
      border: 1px solid rgba(82,214,220,0.23);
      border-radius: 999px;
      background: rgba(82,214,220,0.06);
      font-size: 0.68rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .locked .lock-state {
      color: var(--dim);
      border-color: rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }

    .progress-line {
      height: 7px;
      margin-top: 13px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
    }

    .progress-line > span {
      display: block;
      height: 100%;
      width: var(--w, 0%);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--gold), var(--emerald));
    }

    .section-hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
      padding: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background:
        linear-gradient(100deg, rgba(224,189,105,0.11), transparent 45%),
        rgba(255,255,255,0.02);
    }

    .section-hero h2 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.6rem, 3vw, 3.1rem);
      letter-spacing: 0;
    }

    .hero-details {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 6px 10px;
      color: #d9d5c3;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 999px;
      background: rgba(0,0,0,0.18);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .chip.gold {
      color: var(--gold-2);
      border-color: rgba(224,189,105,0.25);
      background: rgba(224,189,105,0.08);
    }

    .big-ring {
      display: grid;
      place-items: center;
      width: 132px;
      aspect-ratio: 1;
      border-radius: 999px;
      background: conic-gradient(var(--gold) var(--ring, 0%), rgba(255,255,255,0.08) 0);
      box-shadow: 0 0 42px rgba(224,189,105,0.1);
    }

    .big-ring > div {
      display: grid;
      place-items: center;
      width: 104px;
      aspect-ratio: 1;
      border-radius: inherit;
      background: #0b1013;
      color: var(--gold-2);
      font-size: 1.8rem;
      font-weight: 950;
    }

    .work-grid {
      display: grid;
      grid-template-columns: minmax(260px, 0.9fr) minmax(300px, 1.2fr);
      gap: 14px;
      padding: 14px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .block-button,
    .mission-button,
    .mini-item {
      width: 100%;
      color: var(--ink);
      text-align: left;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      background: rgba(7, 11, 13, 0.72);
    }

    .block-button {
      padding: 13px;
      transition: border-color 160ms ease, transform 160ms ease;
    }

    .block-button:hover,
    .block-button.active,
    .mission-button:hover {
      transform: translateY(-1px);
      border-color: rgba(82,214,220,0.45);
    }

    .block-top {
      display: grid;
      grid-template-columns: 1fr 42px;
      gap: 10px;
      align-items: center;
    }

    .block-title {
      display: block;
      font-weight: 950;
    }

    .block-subtitle {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .compact-ring {
      width: 42px;
      height: 42px;
      font-size: 0.7rem;
      font-weight: 950;
    }

    .due-text {
      margin-top: 10px;
      color: #c5c3b6;
      font-size: 0.78rem;
    }

    .node-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
      gap: 10px;
    }

    .ayah-node {
      min-height: 84px;
      padding: 9px;
      color: var(--ink);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      background: rgba(5, 8, 9, 0.78);
      text-align: center;
      transition: transform 150ms ease, border-color 150ms ease;
    }

    .ayah-node:hover,
    .ayah-node.active {
      transform: translateY(-2px);
      border-color: rgba(224,189,105,0.5);
    }

    .node-ring {
      width: 38px;
      height: 38px;
      margin: 0 auto 7px;
      font-size: 0.78rem;
      font-weight: 950;
    }

    .node-state {
      display: block;
      color: var(--muted);
      font-size: 0.66rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .detail-panel {
      margin-top: 12px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      background: rgba(3, 6, 7, 0.68);
    }

    .detail-panel h3 {
      margin: 0 0 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.45rem;
      letter-spacing: 0;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .detail-cell {
      min-height: 62px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.03);
    }

    .detail-cell span {
      display: block;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 900;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .detail-cell strong {
      display: block;
      margin-top: 5px;
      color: var(--ink);
      font-size: 0.98rem;
    }

    .primary-action,
    .secondary-action,
    .danger-action,
    .result-action {
      min-height: 42px;
      padding: 10px 12px;
      border-radius: var(--radius);
      font-weight: 950;
      letter-spacing: 0.02em;
    }

    .primary-action {
      color: #070806;
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      box-shadow: 0 12px 30px rgba(224,189,105,0.18);
    }

    .secondary-action {
      color: var(--ink);
      border: 1px solid rgba(82,214,220,0.22);
      background: rgba(82,214,220,0.08);
    }

    .danger-action {
      color: #fff2ed;
      border: 1px solid rgba(255,93,93,0.24);
      background: rgba(255,93,93,0.09);
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 12px;
    }

    .right-stack {
      display: grid;
      gap: 14px;
    }

    .mission-list,
    .mini-list {
      display: grid;
      gap: 9px;
    }

    .mission-button {
      padding: 11px;
    }

    .mission-button strong {
      display: block;
      font-size: 0.9rem;
    }

    .mission-button span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .mini-item {
      padding: 10px;
    }

    .mini-item strong {
      display: block;
      font-size: 0.86rem;
    }

    .mini-item span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.76rem;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .toolbar button,
    .file-label {
      display: grid;
      place-items: center;
      min-height: 38px;
      padding: 8px;
      color: var(--ink);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.04);
      font-size: 0.75rem;
      font-weight: 950;
      text-align: center;
      cursor: pointer;
    }

    .file-label input {
      display: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: start;
      justify-items: center;
      padding: 10px;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(8px);
      overflow: auto;
    }

    .modal.active {
      display: grid;
    }

    .challenge {
      width: min(390px, 100%);
      max-height: calc(100dvh - 20px);
      border: 1px solid #303030;
      border-radius: 22px;
      background: #181818;
      box-shadow: 0 24px 80px rgba(0,0,0,0.66);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .challenge-header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid #252525;
      background: #090909;
    }

    .challenge .eyebrow {
      color: #9b9ba0;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
    }

    .challenge-header h2 {
      margin: 3px 0 0;
      color: #f2f2f2;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 1.55rem;
      line-height: 1.05;
      font-weight: 850;
      letter-spacing: 0;
    }

    .close-btn {
      width: 44px;
      height: 44px;
      color: #f2f2f2;
      border: 1px solid #424242;
      border-radius: 999px;
      background: #2a2a2a;
      font-size: 1.3rem;
      font-weight: 900;
    }

    .challenge-body {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .challenge .detail-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .challenge .detail-cell {
      min-height: 66px;
      padding: 10px;
      border: 0;
      border-radius: 14px;
      background: #252525;
    }

    .challenge .detail-cell span {
      color: #9e9ea4;
      font-size: .62rem;
      letter-spacing: .08em;
    }

    .challenge .detail-cell strong {
      margin-top: 4px;
      color: #f2f2f2;
      font-size: .88rem;
      line-height: 1.2;
    }

    .challenge .action-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 0;
    }

    .challenge .secondary-action {
      min-height: 44px;
      padding: 9px;
      color: #f2f2f2;
      border: 0;
      border-radius: 14px;
      background: #303030;
      font-size: .86rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .cue-box {
      min-height: 96px;
      padding: 16px;
      border: 0;
      border-radius: 16px;
      background: #111111;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .cue-label {
      color: #9e9ea4;
      font-size: .68rem;
      font-weight: 850;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .cue-main {
      margin-top: 8px;
      color: #f2f2f2;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 2rem;
      line-height: 1.05;
      font-weight: 850;
      letter-spacing: 0;
    }

    .cue-arabic {
      direction: rtl;
      font-family: "Amiri", "Scheherazade New", Georgia, serif;
      font-size: 2rem;
      line-height: 1.4;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .result-action {
      min-height: 54px;
      color: #f3f3f3;
      border: 0;
      border-radius: 14px;
      background: #303030;
      font-size: .92rem;
      font-weight: 850;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .result-action.perfect {
      color: #071207;
      background: #d8f5d8;
    }

    .result-action.minor {
      color: #071013;
      background: #b9edf0;
    }

    .result-action.cue {
      background: #674725;
    }

    .result-action.failed {
      background: #733030;
    }

    .notice {
      display: none;
      padding: 12px;
      border: 1px solid rgba(224,189,105,0.26);
      border-radius: var(--radius);
      background: rgba(224,189,105,0.08);
      color: var(--gold-2);
      font-weight: 850;
    }

    .notice.active {
      display: block;
    }

    .status-future .node-ring,
    .status-future .compact-ring,
    .status-future .section-mark {
      background: conic-gradient(var(--emerald) var(--ring, 0%), rgba(255,255,255,0.1) 0);
    }

    .status-due_soon {
      box-shadow: 0 0 26px rgba(82,214,220,0.10);
    }

    .status-due_now {
      box-shadow: 0 0 26px rgba(224,189,105,0.13);
    }

    .status-overdue {
      box-shadow: 0 0 26px rgba(255,154,85,0.14);
    }

    .status-decay_risk {
      box-shadow: 0 0 30px rgba(255,93,93,0.18);
    }

    .hidden {
      display: none !important;
    }

    .simple-layout {
      grid-template-columns: 1fr;
    }

    .main-flow {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .focus-strip,
    .support-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .focus-card {
      min-height: 112px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      background: rgba(7, 11, 13, 0.72);
    }

    .focus-card strong {
      display: block;
      color: var(--gold-2);
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .focus-card span {
      display: block;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
    }

    .reference-text {
      direction: rtl;
      margin-top: 10px;
      padding: 14px;
      color: #fbf4da;
      border: 1px solid rgba(224,189,105,0.2);
      border-radius: var(--radius);
      background: rgba(224,189,105,0.07);
      font-family: "Amiri", "Scheherazade New", Georgia, serif;
      font-size: 1.35rem;
      line-height: 1.9;
      text-align: right;
    }

    .reference-text span {
      color: var(--cyan);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 0.82rem;

    const SURAH_AYAT = [
      {"ayah":1,"text":"يَـٰٓأَيُّهَا ٱلنَّاسُ ٱتَّقُواْ رَبَّكُمۡۚ إِنَّ زَلۡزَلَةَ ٱلسَّاعَةِ شَيۡءٌ عَظِيمٞ"},
      {"ayah":2,"text":"يَوۡمَ تَرَوۡنَهَا تَذۡهَلُ كُلُّ مُرۡضِعَةٍ عَمَّآ أَرۡضَعَتۡ وَتَضَعُ كُلُّ ذَاتِ حَمۡلٍ حَمۡلَهَا وَتَرَى ٱلنَّاسَ سُكَٰرَىٰ وَمَا هُم بِسُكَٰرَىٰ وَلَٰكِنَّ عَذَابَ ٱللَّهِ شَدِيدٞ"},
      {"ayah":3,"text":"وَمِنَ ٱلنَّاسِ مَن يُجَٰدِلُ فِي ٱللَّهِ بِغَيۡرِ عِلۡمٖ وَيَتَّبِعُ كُلَّ شَيۡطَٰنٖ مَّرِيدٖ"},
      {"ayah":4,"text":"كُتِبَ عَلَيۡهِ أَنَّهُۥ مَن تَوَلَّاهُ فَأَنَّهُۥ يُضِلُّهُۥ وَيَهۡدِيهِ إِلَىٰ عَذَابِ ٱلسَّعِيرِ"},
      {"ayah":5,"text":"يَـٰٓأَيُّهَا ٱلنَّاسُ إِن كُنتُمۡ فِي رَيۡبٖ مِّنَ ٱلۡبَعۡثِ فَإِنَّا خَلَقۡنَٰكُم مِّن تُرَابٖ ثُمَّ مِن نُّطۡفَةٖ ثُمَّ مِنۡ عَلَقَةٖ ثُمَّ مِن مُّضۡغَةٖ مُّخَلَّقَةٖ وَغَيۡرِ مُخَلَّقَةٖ لِّنُبَيِّنَ لَكُمۡۚ وَنُقِرُّ فِي ٱلۡأَرۡحَامِ مَا نَشَآءُ إِلَىٰٓ أَجَلٖ مُّسَمّٗى ثُمَّ نُخۡرِجُكُمۡ طِفۡلٗا ثُمَّ لِتَبۡلُغُوٓاْ أَشُدَّكُمۡۖ وَمِنكُم مَّن يُتَوَفَّىٰ وَمِنكُم مَّن يُرَدُّ إِلَىٰٓ أَرۡذَلِ ٱلۡعُمُرِ لِكَيۡلَا يَعۡلَمَ مِنۢ بَعۡدِ عِلۡمٖ شَيۡـٔٗاۚ وَتَرَى ٱلۡأَرۡضَ هَامِدَةٗ فَإِذَآ أَنزَلۡنَا عَلَيۡهَا ٱلۡمَآءَ ٱهۡتَزَّتۡ وَرَبَتۡ وَأَنۢبَتَتۡ مِن كُلِّ زَوۡجِۭ بَهِيجٖ"},
      {"ayah":6,"text":"ذَٰلِكَ بِأَنَّ ٱللَّهَ هُوَ ٱلۡحَقُّ وَأَنَّهُۥ يُحۡيِ ٱلۡمَوۡتَىٰ وَأَنَّهُۥ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٞ"},
      {"ayah":7,"text":"وَأَنَّ ٱلسَّاعَةَ ءَاتِيَةٞ لَّا رَيۡبَ فِيهَا وَأَنَّ ٱللَّهَ يَبۡعَثُ مَن فِي ٱلۡقُبُورِ"},
      {"ayah":8,"text":"وَمِنَ ٱلنَّاسِ مَن يُجَٰدِلُ فِي ٱللَّهِ بِغَيۡرِ عِلۡمٖ وَلَا هُدٗى وَلَا كِتَٰبٖ مُّنِيرٖ"},
      {"ayah":9,"text":"ثَانِيَ عِطۡفِهِۦ لِيُضِلَّ عَن سَبِيلِ ٱللَّهِۖ لَهُۥ فِي ٱلدُّنۡيَا خِزۡيٞۖ وَنُذِيقُهُۥ يَوۡمَ ٱلۡقِيَٰمَةِ عَذَابَ ٱلۡحَرِيقِ"},
      {"ayah":10,"text":"ذَٰلِكَ بِمَا قَدَّمَتۡ يَدَاكَ وَأَنَّ ٱللَّهَ لَيۡسَ بِظَلَّـٰمٖ لِّلۡعَبِيدِ"},
      {"ayah":11,"text":"وَمِنَ ٱلنَّاسِ مَن يَعۡبُدُ ٱللَّهَ عَلَىٰ حَرۡفٖۖ فَإِنۡ أَصَابَهُۥ خَيۡرٌ ٱطۡمَأَنَّ بِهِۦۖ وَإِنۡ أَصَابَتۡهُ فِتۡنَةٌ ٱنقَلَبَ عَلَىٰ وَجۡهِهِۦ خَسِرَ ٱلدُّنۡيَا وَٱلۡأٓخِرَةَۚ ذَٰلِكَ هُوَ ٱلۡخُسۡرَانُ ٱلۡمُبِينُ"},
      {"ayah":12,"text":"يَدۡعُواْ مِن دُونِ ٱللَّهِ مَا لَا يَضُرُّهُۥ وَمَا لَا يَنفَعُهُۥۚ ذَٰلِكَ هُوَ ٱلضَّلَٰلُ ٱلۡبَعِيدُ"},
      {"ayah":13,"text":"يَدۡعُواْ لَمَن ضَرُّهُۥٓ أَقۡرَبُ مِن نَّفۡعِهِۦۚ لَبِئۡسَ ٱلۡمَوۡلَىٰ وَلَبِئۡسَ ٱلۡعَشِيرُ"},
      {"ayah":14,"text":"إِنَّ ٱللَّهَ يُدۡخِلُ ٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّـٰلِحَٰتِ جَنَّـٰتٖ تَجۡرِي مِن تَحۡتِهَا ٱلۡأَنۡهَٰرُۚ إِنَّ ٱللَّهَ يَفۡعَلُ مَا يُرِيدُ"},
      {"ayah":15,"text":"مَن كَانَ يَظُنُّ أَن لَّن يَنصُرَهُ ٱللَّهُ فِي ٱلدُّنۡيَا وَٱلۡأٓخِرَةِ فَلۡيَمۡدُدۡ بِسَبَبٍ إِلَى ٱلسَّمَآءِ ثُمَّ لۡيَقۡطَعۡ فَلۡيَنظُرۡ هَلۡ يُذۡهِبَنَّ كَيۡدُهُۥ مَا يَغِيظُ"},
      {"ayah":16,"text":"وَكَذَٰلِكَ أَنزَلۡنَٰهُ ءَايَٰتِۭ بَيِّنَٰتٖ وَأَنَّ ٱللَّهَ يَهۡدِي مَن يُرِيدُ"},
      {"ayah":17,"text":"إِنَّ ٱلَّذِينَ ءَامَنُواْ وَٱلَّذِينَ هَادُواْ وَٱلصَّـٰبِـِٔينَ وَٱلنَّصَٰرَىٰ وَٱلۡمَجُوسَ وَٱلَّذِينَ أَشۡرَكُوٓاْ إِنَّ ٱللَّهَ يَفۡصِلُ بَيۡنَهُمۡ يَوۡمَ ٱلۡقِيَٰمَةِۚ إِنَّ ٱللَّهَ عَلَىٰ كُلِّ شَيۡءٖ شَهِيدٌ"},
      {"ayah":18,"text":"أَلَمۡ تَرَ أَنَّ ٱللَّهَ يَسۡجُدُۤ لَهُۥۤ مَن فِي ٱلسَّمَٰوَٰتِ وَمَن فِي ٱلۡأَرۡضِ وَٱلشَّمۡسُ وَٱلۡقَمَرُ وَٱلنُّجُومُ وَٱلۡجِبَالُ وَٱلشَّجَرُ وَٱلدَّوَآبُّ وَكَثِيرٞ مِّنَ ٱلنَّاسِۖ وَكَثِيرٌ حَقَّ عَلَيۡهِ ٱلۡعَذَابُۗ وَمَن يُهِنِ ٱللَّهُ فَمَا لَهُۥ مِن مُّكۡرِمٍۚ إِنَّ ٱللَّهَ يَفۡعَلُ مَا يَشَآءُ۩"},
      {"ayah":19,"text":"۞هَٰذَانِ خَصۡمَانِ ٱخۡتَصَمُواْ فِي رَبِّهِمۡۖ فَٱلَّذِينَ كَفَرُواْ قُطِّعَتۡ لَهُمۡ ثِيَابٞ مِّن نَّارٖ يُصَبُّ مِن فَوۡقِ رُءُوسِهِمُ ٱلۡحَمِيمُ"},
      {"ayah":20,"text":"يُصۡهَرُ بِهِۦ مَا فِي بُطُونِهِمۡ وَٱلۡجُلُودُ"},
      {"ayah":21,"text":"وَلَهُم مَّقَٰمِعُ مِنۡ حَدِيدٖ"},
      {"ayah":22,"text":"كُلَّمَآ أَرَادُوٓاْ أَن يَخۡرُجُواْ مِنۡهَا مِنۡ غَمٍّ أُعِيدُواْ فِيهَا وَذُوقُواْ عَذَابَ ٱلۡحَرِيقِ"},
      {"ayah":23,"text":"إِنَّ ٱللَّهَ يُدۡخِلُ ٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّـٰلِحَٰتِ جَنَّـٰتٖ تَجۡرِي مِن تَحۡتِهَا ٱلۡأَنۡهَٰرُ يُحَلَّوۡنَ فِيهَا مِنۡ أَسَاوِرَ مِن ذَهَبٖ وَلُؤۡلُؤٗاۖ وَلِبَاسُهُمۡ فِيهَا حَرِيرٞ"},
      {"ayah":24,"text":"وَهُدُوٓاْ إِلَى ٱلطَّيِّبِ مِنَ ٱلۡقَوۡلِ وَهُدُوٓاْ إِلَىٰ صِرَٰطِ ٱلۡحَمِيدِ"},
      {"ayah":25,"text":"إِنَّ ٱلَّذِينَ كَفَرُواْ وَيَصُدُّونَ عَن سَبِيلِ ٱللَّهِ وَٱلۡمَسۡجِدِ ٱلۡحَرَامِ ٱلَّذِي جَعَلۡنَٰهُ لِلنَّاسِ سَوَآءً ٱلۡعَٰكِفُ فِيهِ وَٱلۡبَادِۚ وَمَن يُرِدۡ فِيهِ بِإِلۡحَادِۭ بِظُلۡمٖ نُّذِقۡهُ مِنۡ عَذَابٍ أَلِيمٖ"},
      {"ayah":26,"text":"وَإِذۡ بَوَّأۡنَا لِإِبۡرَٰهِيمَ مَكَانَ ٱلۡبَيۡتِ أَن لَّا تُشۡرِكۡ بِي شَيۡـٔٗا وَطَهِّرۡ بَيۡتِيَ لِلطَّآئِفِينَ وَٱلۡقَآئِمِينَ وَٱلرُّكَّعِ ٱلسُّجُودِ"},
      {"ayah":27,"text":"وَأَذِّن فِي ٱلنَّاسِ بِٱلۡحَجِّ يَأۡتُوكَ رِجَالٗا وَعَلَىٰ كُلِّ ضَامِرٖ يَأۡتِينَ مِن كُلِّ فَجٍّ عَمِيقٖ"},
      {"ayah":28,"text":"لِّيَشۡهَدُواْ مَنَٰفِعَ لَهُمۡ وَيَذۡكُرُواْ ٱسۡمَ ٱللَّهِ فِيٓ أَيَّامٖ مَّعۡلُومَٰتٍ عَلَىٰ مَا رَزَقَهُم مِّنۢ بَهِيمَةِ ٱلۡأَنۡعَٰمِۖ فَكُلُواْ مِنۡهَا وَأَطۡعِمُواْ ٱلۡبَآئِسَ ٱلۡفَقِيرَ"},
      {"ayah":29,"text":"ثُمَّ لۡيَقۡضُواْ تَفَثَهُمۡ وَلۡيُوفُواْ نُذُورَهُمۡ وَلۡيَطَّوَّفُواْ بِٱلۡبَيۡتِ ٱلۡعَتِيقِ"},
      {"ayah":30,"text":"ذَٰلِكَۖ وَمَن يُعَظِّمۡ حُرُمَٰتِ ٱللَّهِ فَهُوَ خَيۡرٞ لَّهُۥ عِندَ رَبِّهِۦۗ وَأُحِلَّتۡ لَكُمُ ٱلۡأَنۡعَٰمُ إِلَّا مَا يُتۡلَىٰ عَلَيۡكُمۡۖ فَٱجۡتَنِبُواْ ٱلرِّجۡسَ مِنَ ٱلۡأَوۡثَٰنِ وَٱجۡتَنِبُواْ قَوۡلَ ٱلزُّورِ"},
      {"ayah":31,"text":"حُنَفَآءَ لِلَّهِ غَيۡرَ مُشۡرِكِينَ بِهِۦۚ وَمَن يُشۡرِكۡ بِٱللَّهِ فَكَأَنَّمَا خَرَّ مِنَ ٱلسَّمَآءِ فَتَخۡطَفُهُ ٱلطَّيۡرُ أَوۡ تَهۡوِي بِهِ ٱلرِّيحُ فِي مَكَانٖ سَحِيقٖ"},
      {"ayah":32,"text":"ذَٰلِكَۖ وَمَن يُعَظِّمۡ شَعَـٰٓئِرَ ٱللَّهِ فَإِنَّهَا مِن تَقۡوَى ٱلۡقُلُوبِ"},
      {"ayah":33,"text":"لَكُمۡ فِيهَا مَنَٰفِعُ إِلَىٰٓ أَجَلٖ مُّسَمّٗى ثُمَّ مَحِلُّهَآ إِلَى ٱلۡبَيۡتِ ٱلۡعَتِيقِ"},
      {"ayah":34,"text":"وَلِكُلِّ أُمَّةٖ جَعَلۡنَا مَنسَكٗا لِّيَذۡكُرُواْ ٱسۡمَ ٱللَّهِ عَلَىٰ مَا رَزَقَهُم مِّنۢ بَهِيمَةِ ٱلۡأَنۡعَٰمِۗ فَإِلَٰهُكُمۡ إِلَٰهٞ وَٰحِدٞ فَلَهُۥٓ أَسۡلِمُواْۗ وَبَشِّرِ ٱلۡمُخۡبِتِينَ"},
      {"ayah":35,"text":"ٱلَّذِينَ إِذَا ذُكِرَ ٱللَّهُ وَجِلَتۡ قُلُوبُهُمۡ وَٱلصَّـٰبِرِينَ عَلَىٰ مَآ أَصَابَهُمۡ وَٱلۡمُقِيمِي ٱلصَّلَوٰةِ وَمِمَّا رَزَقۡنَٰهُمۡ يُنفِقُونَ"},
      {"ayah":36,"text":"وَٱلۡبُدۡنَ جَعَلۡنَٰهَا لَكُم مِّن شَعَـٰٓئِرِ ٱللَّهِ لَكُمۡ فِيهَا خَيۡرٞۖ فَٱذۡكُرُواْ ٱسۡمَ ٱللَّهِ عَلَيۡهَا صَوَآفَّۖ فَإِذَا وَجَبَتۡ جُنُوبُهَا فَكُلُواْ مِنۡهَا وَأَطۡعِمُواْ ٱلۡقَانِعَ وَٱلۡمُعۡتَرَّۚ كَذَٰلِكَ سَخَّرۡنَٰهَا لَكُمۡ لَعَلَّكُمۡ تَشۡكُرُونَ"},
      {"ayah":37,"text":"لَن يَنَالَ ٱللَّهَ لُحُومُهَا وَلَا دِمَآؤُهَا وَلَٰكِن يَنَالُهُ ٱلتَّقۡوَىٰ مِنكُمۡۚ كَذَٰلِكَ سَخَّرَهَا لَكُمۡ لِتُكَبِّرُواْ ٱللَّهَ عَلَىٰ مَا هَدَىٰكُمۡۗ وَبَشِّرِ ٱلۡمُحۡسِنِينَ"},
      {"ayah":38,"text":"۞إِنَّ ٱللَّهَ يُدَٰفِعُ عَنِ ٱلَّذِينَ ءَامَنُوٓاْۗ إِنَّ ٱللَّهَ لَا يُحِبُّ كُلَّ خَوَّانٖ كَفُورٍ"},
      {"ayah":39,"text":"أُذِنَ لِلَّذِينَ يُقَٰتَلُونَ بِأَنَّهُمۡ ظُلِمُواْۚ وَإِنَّ ٱللَّهَ عَلَىٰ نَصۡرِهِمۡ لَقَدِيرٌ"},
      {"ayah":40,"text":"ٱلَّذِينَ أُخۡرِجُواْ مِن دِيَٰرِهِم بِغَيۡرِ حَقٍّ إِلَّآ أَن يَقُولُواْ رَبُّنَا ٱللَّهُۗ وَلَوۡلَا دَفۡعُ ٱللَّهِ ٱلنَّاسَ بَعۡضَهُم بِبَعۡضٖ لَّهُدِّمَتۡ صَوَٰمِعُ وَبِيَعٞ وَصَلَوَٰتٞ وَمَسَٰجِدُ يُذۡكَرُ فِيهَا ٱسۡمُ ٱللَّهِ كَثِيرٗاۗ وَلَيَنصُرَنَّ ٱللَّهُ مَن يَنصُرُهُۥٓۚ إِنَّ ٱللَّهَ لَقَوِيٌّ عَزِيزٌ"},
      {"ayah":41,"text":"ٱلَّذِينَ إِن مَّكَّنَّـٰهُمۡ فِي ٱلۡأَرۡضِ أَقَامُواْ ٱلصَّلَوٰةَ وَءَاتَوُاْ ٱلزَّكَوٰةَ وَأَمَرُواْ بِٱلۡمَعۡرُوفِ وَنَهَوۡاْ عَنِ ٱلۡمُنكَرِۗ وَلِلَّهِ عَٰقِبَةُ ٱلۡأُمُورِ"},
      {"ayah":42,"text":"وَإِن يُكَذِّبُوكَ فَقَدۡ كَذَّبَتۡ قَبۡلَهُمۡ قَوۡمُ نُوحٖ وَعَادٞ وَثَمُودُ"},
      {"ayah":43,"text":"وَقَوۡمُ إِبۡرَٰهِيمَ وَقَوۡمُ لُوطٖ"},
      {"ayah":44,"text":"وَأَصۡحَٰبُ مَدۡيَنَۖ وَكُذِّبَ مُوسَىٰۖ فَأَمۡلَيۡتُ لِلۡكَٰفِرِينَ ثُمَّ أَخَذۡتُهُمۡۖ فَكَيۡفَ كَانَ نَكِيرِ"},
      {"ayah":45,"text":"فَكَأَيِّن مِّن قَرۡيَةٍ أَهۡلَكۡنَٰهَا وَهِيَ ظَالِمَةٞ فَهِيَ خَاوِيَةٌ عَلَىٰ عُرُوشِهَا وَبِئۡرٖ مُّعَطَّلَةٖ وَقَصۡرٖ مَّشِيدٍ"},
      {"ayah":46,"text":"أَفَلَمۡ يَسِيرُواْ فِي ٱلۡأَرۡضِ فَتَكُونَ لَهُمۡ قُلُوبٞ يَعۡقِلُونَ بِهَآ أَوۡ ءَاذَانٞ يَسۡمَعُونَ بِهَاۖ فَإِنَّهَا لَا تَعۡمَى ٱلۡأَبۡصَٰرُ وَلَٰكِن تَعۡمَى ٱلۡقُلُوبُ ٱلَّتِي فِي ٱلصُّدُورِ"},
      {"ayah":47,"text":"وَيَسۡتَعۡجِلُونَكَ بِٱلۡعَذَابِ وَلَن يُخۡلِفَ ٱللَّهُ وَعۡدَهُۥۚ وَإِنَّ يَوۡمًا عِندَ رَبِّكَ كَأَلۡفِ سَنَةٖ مِّمَّا تَعُدُّونَ"},
      {"ayah":48,"text":"وَكَأَيِّن مِّن قَرۡيَةٍ أَمۡلَيۡتُ لَهَا وَهِيَ ظَالِمَةٞ ثُمَّ أَخَذۡتُهَا وَإِلَيَّ ٱلۡمَصِيرُ"},
      {"ayah":49,"text":"قُلۡ يَـٰٓأَيُّهَا ٱلنَّاسُ إِنَّمَآ أَنَا۠ لَكُمۡ نَذِيرٞ مُّبِينٞ"},
      {"ayah":50,"text":"فَٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّـٰلِحَٰتِ لَهُم مَّغۡفِرَةٞ وَرِزۡقٞ كَرِيمٞ"},
      {"ayah":51,"text":"وَٱلَّذِينَ سَعَوۡاْ فِيٓ ءَايَٰتِنَا مُعَٰجِزِينَ أُوْلَـٰٓئِكَ أَصۡحَٰبُ ٱلۡجَحِيمِ"},
      {"ayah":52,"text":"وَمَآ أَرۡسَلۡنَا مِن قَبۡلِكَ مِن رَّسُولٖ وَلَا نَبِيٍّ إِلَّآ إِذَا تَمَنَّىٰٓ أَلۡقَى ٱلشَّيۡطَٰنُ فِيٓ أُمۡنِيَّتِهِۦ فَيَنسَخُ ٱللَّهُ مَا يُلۡقِي ٱلشَّيۡطَٰنُ ثُمَّ يُحۡكِمُ ٱللَّهُ ءَايَٰتِهِۦۗ وَٱللَّهُ عَلِيمٌ حَكِيمٞ"},
      {"ayah":53,"text":"لِّيَجۡعَلَ مَا يُلۡقِي ٱلشَّيۡطَٰنُ فِتۡنَةٗ لِّلَّذِينَ فِي قُلُوبِهِم مَّرَضٞ وَٱلۡقَاسِيَةِ قُلُوبُهُمۡۗ وَإِنَّ ٱلظَّـٰلِمِينَ لَفِي شِقَاقِۭ بَعِيدٖ"},
      {"ayah":54,"text":"وَلِيَعۡلَمَ ٱلَّذِينَ أُوتُواْ ٱلۡعِلۡمَ أَنَّهُ ٱلۡحَقُّ مِن رَّبِّكَ فَيُؤۡمِنُواْ بِهِۦ فَتُخۡبِتَ لَهُۥ قُلُوبُهُمۡۗ وَإِنَّ ٱللَّهَ لَهَادِ ٱلَّذِينَ ءَامَنُوٓاْ إِلَىٰ صِرَٰطٖ مُّسۡتَقِيمٖ"},
      {"ayah":55,"text":"وَلَا يَزَالُ ٱلَّذِينَ كَفَرُواْ فِي مِرۡيَةٖ مِّنۡهُ حَتَّىٰ تَأۡتِيَهُمُ ٱلسَّاعَةُ بَغۡتَةً أَوۡ يَأۡتِيَهُمۡ عَذَابُ يَوۡمٍ عَقِيمٍ"},
      {"ayah":56,"text":"ٱلۡمُلۡكُ يَوۡمَئِذٖ لِّلَّهِ يَحۡكُمُ بَيۡنَهُمۡۚ فَٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّـٰلِحَٰتِ فِي جَنَّـٰتِ ٱلنَّعِيمِ"},
      {"ayah":57,"text":"وَٱلَّذِينَ كَفَرُواْ وَكَذَّبُواْ بِـَٔايَٰتِنَا فَأُوْلَـٰٓئِكَ لَهُمۡ عَذَابٞ مُّهِينٞ"},
      {"ayah":58,"text":"وَٱلَّذِينَ هَاجَرُواْ فِي سَبِيلِ ٱللَّهِ ثُمَّ قُتِلُوٓاْ أَوۡ مَاتُواْ لَيَرۡزُقَنَّهُمُ ٱللَّهُ رِزۡقًا حَسَنٗاۚ وَإِنَّ ٱللَّهَ لَهُوَ خَيۡرُ ٱلرَّـٰزِقِينَ"},
      {"ayah":59,"text":"لَيُدۡخِلَنَّهُم مُّدۡخَلٗا يَرۡضَوۡنَهُۥۚ وَإِنَّ ٱللَّهَ لَعَلِيمٌ حَلِيمٞ"},
      {"ayah":60,"text":"۞ذَٰلِكَۖ وَمَنۡ عَاقَبَ بِمِثۡلِ مَا عُوقِبَ بِهِۦ ثُمَّ بُغِيَ عَلَيۡهِ لَيَنصُرَنَّهُ ٱللَّهُۚ إِنَّ ٱللَّهَ لَعَفُوٌّ غَفُورٞ"},
      {"ayah":61,"text":"ذَٰلِكَ بِأَنَّ ٱللَّهَ يُولِجُ ٱلَّيۡلَ فِي ٱلنَّهَارِ وَيُولِجُ ٱلنَّهَارَ فِي ٱلَّيۡلِ وَأَنَّ ٱللَّهَ سَمِيعُۢ بَصِيرٞ"},
      {"ayah":62,"text":"ذَٰلِكَ بِأَنَّ ٱللَّهَ هُوَ ٱلۡحَقُّ وَأَنَّ مَا يَدۡعُونَ مِن دُونِهِۦ هُوَ ٱلۡبَٰطِلُ وَأَنَّ ٱللَّهَ هُوَ ٱلۡعَلِيُّ ٱلۡكَبِيرُ"},
      {"ayah":63,"text":"أَلَمۡ تَرَ أَنَّ ٱللَّهَ أَنزَلَ مِنَ ٱلسَّمَآءِ مَآءٗ فَتُصۡبِحُ ٱلۡأَرۡضُ مُخۡضَرَّةًۚ إِنَّ ٱللَّهَ لَطِيفٌ خَبِيرٞ"},
      {"ayah":64,"text":"لَّهُۥ مَا فِي ٱلسَّمَٰوَٰتِ وَمَا فِي ٱلۡأَرۡضِۚ وَإِنَّ ٱللَّهَ لَهُوَ ٱلۡغَنِيُّ ٱلۡحَمِيدُ"},
      {"ayah":65,"text":"أَلَمۡ تَرَ أَنَّ ٱللَّهَ سَخَّرَ لَكُم مَّا فِي ٱلۡأَرۡضِ وَٱلۡفُلۡكَ تَجۡرِي فِي ٱلۡبَحۡرِ بِأَمۡرِهِۦ وَيُمۡسِكُ ٱلسَّمَآءَ أَن تَقَعَ عَلَى ٱلۡأَرۡضِ إِلَّا بِإِذۡنِهِۦٓۚ إِنَّ ٱللَّهَ بِٱلنَّاسِ لَرَءُوفٞ رَّحِيمٞ"},
      {"ayah":66,"text":"وَهُوَ ٱلَّذِيٓ أَحۡيَاكُمۡ ثُمَّ يُمِيتُكُمۡ ثُمَّ يُحۡيِيكُمۡۗ إِنَّ ٱلۡإِنسَٰنَ لَكَفُورٞ"},
      {"ayah":67,"text":"لِّكُلِّ أُمَّةٖ جَعَلۡنَا مَنسَكًا هُمۡ نَاسِكُوهُۖ فَلَا يُنَٰزِعُنَّكَ فِي ٱلۡأَمۡرِۚ وَٱدۡعُ إِلَىٰ رَبِّكَۖ إِنَّكَ لَعَلَىٰ هُدٗى مُّسۡتَقِيمٖ"},
      {"ayah":68,"text":"وَإِن جَٰدَلُوكَ فَقُلِ ٱللَّهُ أَعۡلَمُ بِمَا تَعۡمَلُونَ"},
      {"ayah":69,"text":"ٱللَّهُ يَحۡكُمُ بَيۡنَكُمۡ يَوۡمَ ٱلۡقِيَٰمَةِ فِيمَا كُنتُمۡ فِيهِ تَخۡتَلِفُونَ"},
      {"ayah":70,"text":"أَلَمۡ تَعۡلَمۡ أَنَّ ٱللَّهَ يَعۡلَمُ مَا فِي ٱلسَّمَآءِ وَٱلۡأَرۡضِۚ إِنَّ ذَٰلِكَ فِي كِتَٰبٍۚ إِنَّ ذَٰلِكَ عَلَى ٱللَّهِ يَسِيرٞ"},
      {"ayah":71,"text":"وَيَعۡبُدُونَ مِن دُونِ ٱللَّهِ مَا لَمۡ يُنَزِّلۡ بِهِۦ سُلۡطَٰنٗا وَمَا لَيۡسَ لَهُم بِهِۦ عِلۡمٞۗ وَمَا لِلظَّـٰلِمِينَ مِن نَّصِيرٖ"},
      {"ayah":72,"text":"وَإِذَا تُتۡلَىٰ عَلَيۡهِمۡ ءَايَٰتُنَا بَيِّنَٰتٖ تَعۡرِفُ فِي وُجُوهِ ٱلَّذِينَ كَفَرُواْ ٱلۡمُنكَرَۖ يَكَادُونَ يَسۡطُونَ بِٱلَّذِينَ يَتۡلُونَ عَلَيۡهِمۡ ءَايَٰتِنَاۗ قُلۡ أَفَأُنَبِّئُكُم بِشَرّٖ مِّن ذَٰلِكُمُۚ ٱلنَّارُ وَعَدَهَا ٱللَّهُ ٱلَّذِينَ كَفَرُواْۖ وَبِئۡسَ ٱلۡمَصِيرُ"},
      {"ayah":73,"text":"يَـٰٓأَيُّهَا ٱلنَّاسُ ضُرِبَ مَثَلٞ فَٱسۡتَمِعُواْ لَهُۥٓۚ إِنَّ ٱلَّذِينَ تَدۡعُونَ مِن دُونِ ٱللَّهِ لَن يَخۡلُقُواْ ذُبَابٗا وَلَوِ ٱجۡتَمَعُواْ لَهُۥۖ وَإِن يَسۡلُبۡهُمُ ٱلذُّبَابُ شَيۡـٔٗا لَّا يَسۡتَنقِذُوهُ مِنۡهُۚ ضَعُفَ ٱلطَّالِبُ وَٱلۡمَطۡلُوبُ"},
      {"ayah":74,"text":"مَا قَدَرُواْ ٱللَّهَ حَقَّ قَدۡرِهِۦٓۚ إِنَّ ٱللَّهَ لَقَوِيٌّ عَزِيزٌ"},
      {"ayah":75,"text":"ٱللَّهُ يَصۡطَفِي مِنَ ٱلۡمَلَـٰٓئِكَةِ رُسُلٗا وَمِنَ ٱلنَّاسِۚ إِنَّ ٱللَّهَ سَمِيعُۢ بَصِيرٞ"},
      {"ayah":76,"text":"يَعۡلَمُ مَا بَيۡنَ أَيۡدِيهِمۡ وَمَا خَلۡفَهُمۡۚ وَإِلَى ٱللَّهِ تُرۡجَعُ ٱلۡأُمُورُ"},
      {"ayah":77,"text":"يَـٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُواْ ٱرۡكَعُواْ وَٱسۡجُدُواْۤ وَٱعۡبُدُواْ رَبَّكُمۡ وَٱفۡعَلُواْ ٱلۡخَيۡرَ لَعَلَّكُمۡ تُفۡلِحُونَ۩"},
      {"ayah":78,"text":"وَجَٰهِدُواْ فِي ٱللَّهِ حَقَّ جِهَادِهِۦۚ هُوَ ٱجۡتَبَىٰكُمۡ وَمَا جَعَلَ عَلَيۡكُمۡ فِي ٱلدِّينِ مِنۡ حَرَجٖۚ مِّلَّةَ أَبِيكُمۡ إِبۡرَٰهِيمَۚ هُوَ سَمَّىٰكُمُ ٱلۡمُسۡلِمِينَ مِن قَبۡلُ وَفِي هَٰذَا لِيَكُونَ ٱلرَّسُولُ شَهِيدًا عَلَيۡكُمۡ وَتَكُونُواْ شُهَدَآءَ عَلَى ٱلنَّاسِۚ فَأَقِيمُواْ ٱلصَّلَوٰةَ وَءَاتُواْ ٱلزَّكَوٰةَ وَٱعۡتَصِمُواْ بِٱللَّهِ هُوَ مَوۡلَىٰكُمۡۖ فَنِعۡمَ ٱلۡمَوۡلَىٰ وَنِعۡمَ ٱلنَّصِيرُ"}
    ];

    const AYAH_TEXT = Object.fromEntries(SURAH_AYAT.map(item => [item.ayah, item.text]));
    const AYAH_FIRST_WORDS = Object.fromEntries(SURAH_AYAT.map(item => [item.ayah, item.text.split(/\s+/)[0]]));

    // DATA MODEL
    let state;
    let ui = {
      activeTab: "today",
      currentBlockId: null,
      selectedSectionId: 1,
      selectedBlockId: "1-7",
      selectedAyah: 1,
      challengeTarget: null,
      challengeCue: "number",
      lastMessage: ""
    };

    function createInitialState() {
      const now = new Date().toISOString();
      const sections = {};
      SECTIONS.forEach(section => {
        sections[String(section.id)] = {
          id: section.id,
          name: section.name,
          ayahRange: section.ayahRange,
          unlocked: section.id === 1,
          retention: 0
        };
      });

      const ayat = {};
      for (let ayah = 1; ayah <= 78; ayah += 1) {
        const section = SECTIONS.find(item => ayah >= item.ayahRange[0] && ayah <= item.ayahRange[1]);
        const block = BLOCKS.find(item => ayah >= item.ayahRange[0] && ayah <= item.ayahRange[1]);
        ayat[String(ayah)] = {
          ayahNumber: ayah,
          sectionId: section.id,
          blockId: block.id,
          reps: 0,
          retention: 0,
          stageIndex: -1,
          stageName: "Not started",
          firstLockedAt: null,
          lastSuccessfulRecallAt: null,
          nextDueAt: null,
          lastResult: null,
          lastAttemptAt: null,
          weak: false,
          attempts: []
        };
      }

      const blocks = {};
      BLOCKS.forEach(block => {
        blocks[block.id] = {
          id: block.id,
          sectionId: block.sectionId,
          ayahRange: block.ayahRange,
          retention: 0,
          stageIndex: -1,
          stageName: "Not started",
          repTarget: 100,
          firstLockedAt: null,
          lastSuccessfulRecallAt: null,
          nextDueAt: null,
          lastResult: null,
          lastAttemptAt: null,
          weak: false,
          attempts: []
        };
      });

      return {
        version: 1,
        createdAt: now,
        updatedAt: now,
        settings: { ...CONFIG },
        streak: {
          current: 0,
          best: 0,
          lastCompletedReviewDate: null
        },
        sections,
        ayat,
        blocks,
        todayBlocks: ["1-7", "8-13"],
        unlockedAchievements: []
      };
    }

    // STORAGE
    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return recalculate(createInitialState());
        return recalculate(mergeWithInitial(JSON.parse(saved)));
      } catch (error) {
        console.warn("Could not load campaign state", error);
        return recalculate(createInitialState());
      }
    }

    function mergeWithInitial(saved) {
      const initial = createInitialState();
      return hydrateAyatFromStartedBlocks({
        ...initial,
        ...saved,
        settings: { ...initial.settings, ...(saved.settings || {}) },
        streak: { ...initial.streak, ...(saved.streak || {}) },
        sections: { ...initial.sections, ...(saved.sections || {}) },
        ayat: { ...initial.ayat, ...(saved.ayat || {}) },
        blocks: { ...initial.blocks, ...(saved.blocks || {}) },
        todayBlocks: Array.isArray(saved.todayBlocks) ? saved.todayBlocks : initial.todayBlocks,
        unlockedAchievements: Array.isArray(saved.unlockedAchievements) ? saved.unlockedAchievements : []
      });
    }

    function hydrateAyatFromStartedBlocks(nextState) {
      Object.values(nextState.blocks).forEach(block => {
        if ((block.stageIndex ?? -1) < 0 || !(block.retention || 0)) return;
        const ayat = range(block.ayahRange[0], block.ayahRange[1]).map(ayah => nextState.ayat[String(ayah)]).filter(Boolean);
        if (!ayat.length) return;
        ayat.forEach(ayah => {
          if ((ayah.stageIndex ?? -1) >= 0 || (ayah.retention || 0) > 0) return;
          ayah.retention = block.retention || 0;
          ayah.stageIndex = block.stageIndex;
          ayah.stageName = block.stageName || "Not started";
          ayah.firstLockedAt = block.firstLockedAt;
          ayah.lastSuccessfulRecallAt = block.lastSuccessfulRecallAt;
          ayah.nextDueAt = block.nextDueAt;
          ayah.lastResult = block.lastResult;
          ayah.lastAttemptAt = block.lastAttemptAt;
        });
      });
      return nextState;
    }

    function saveState() {
      state.updatedAt = new Date().toISOString();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    // TIME HELPERS
    function getDueStatus(item, now = Date.now()) {
      if (!item.nextDueAt) return item.stageIndex >= 0 ? "future" : "not_started";
      const due = new Date(item.nextDueAt).getTime();
      const diff = due - now;
      if (diff > DAY) return "future";
      if (diff > 0) return "due_soon";
      const overdueBy = Math.abs(diff);
      const stage = RETENTION_STAGES[item.stageIndex] || RETENTION_STAGES[0];
      const grace = stage.graceMs ?? DAY;
      if (overdueBy <= Math.min(DAY, grace / 2)) return "due_now";
      if (overdueBy <= grace) return "overdue";
      return "decay_risk";
    }

    function formatDue(item) {
      if (!item.nextDueAt) return item.stageIndex >= RETENTION_STAGES.length - 1 ? "Complete" : "No review scheduled";
      const diff = new Date(item.nextDueAt).getTime() - Date.now();
      const abs = Math.abs(diff);
      const suffix = diff >= 0 ? "left" : "late";
      if (abs < 60 * 1000) return diff >= 0 ? "Due now" : "Just overdue";
      if (abs < 60 * 60 * 1000) return `${Math.round(abs / (60 * 1000))}m ${suffix}`;
      if (abs < DAY) return `${Math.round(abs / (60 * 60 * 1000))}h ${suffix}`;
      return `${Math.round(abs / DAY)}d ${suffix}`;
    }

    function localDay() {
      return new Date().toLocaleDateString();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    // RETENTION ENGINE
    function applyDecay() {
      const allItems = [...Object.values(state.ayat), ...Object.values(state.blocks)];
      allItems.forEach(item => {
        if (getDueStatus(item) !== "decay_risk" || item.stageIndex <= 0) return;
        item.stageIndex -= 1;
        const stage = RETENTION_STAGES[item.stageIndex];
        item.stageName = stage.name;
        item.retention = stage.retention;
        item.nextDueAt = stage.nextDelayMs ? new Date(Date.now() + stage.nextDelayMs).toISOString() : null;
        item.decayedAt = new Date().toISOString();
      });
    }

    function applyPerfectRecall(item, now = Date.now()) {
      const nextStageIndex = Math.min((item.stageIndex ?? -1) + 1, RETENTION_STAGES.length - 1);
      const nextStage = RETENTION_STAGES[nextStageIndex];
      const lastSuccess = item.lastSuccessfulRecallAt ? new Date(item.lastSuccessfulRecallAt).getTime() : null;
      const canAdvance = !lastSuccess || now - lastSuccess >= nextStage.minDelayMs;

      item.lastResult = "perfect";
      item.lastAttemptAt = new Date(now).toISOString();
      item.weak = false;

      if (canAdvance) {
        item.stageIndex = nextStageIndex;
        item.stageName = nextStage.name;
        item.retention = nextStage.retention;
        item.lastSuccessfulRecallAt = new Date(now).toISOString();
        item.firstLockedAt = item.firstLockedAt || new Date(now).toISOString();
        item.nextDueAt = nextStage.nextDelayMs ? new Date(now + nextStage.nextDelayMs).toISOString() : null;
        return { advanced: true, item };
      }

      item.lastPracticeAt = new Date(now).toISOString();
      return { advanced: false, item };
    }

    function applyMinorHesitation(item, now = Date.now()) {
      item.lastResult = "minor";
      item.lastAttemptAt = new Date(now).toISOString();
      return { advanced: false, item };
    }

    function applyNeededCue(item, now = Date.now()) {
      item.lastResult = "cue";
      item.lastAttemptAt = new Date(now).toISOString();
      item.weak = true;
      return { advanced: false, item };
    }

    function applyFailedRecall(item, now = Date.now()) {
      item.lastResult = "failed";
      item.lastAttemptAt = new Date(now).toISOString();
      item.weak = true;
      if ((item.stageIndex ?? -1) > 0) {
        item.stageIndex -= 1;
        const stage = RETENTION_STAGES[item.stageIndex];
        item.stageName = stage.name;
        item.retention = stage.retention;
        item.nextDueAt = stage.nextDelayMs ? new Date(now + stage.nextDelayMs).toISOString() : null;
      }
      return { advanced: false, item };
    }

    function recordAttempt(targetType, targetId, result) {
      const item = targetType === "ayah" ? state.ayat[String(targetId)] : state.blocks[targetId];
      const previousRetention = item.retention || 0;
      const priorDueStatus = getDueStatus(item);
      const previousUnlocked = unlockedSectionIds();
      let outcome;
      const now = Date.now();

      if (result === "perfect") outcome = applyPerfectRecall(item, now);
      if (result === "minor") outcome = applyMinorHesitation(item, now);
      if (result === "cue") outcome = applyNeededCue(item, now);
      if (result === "failed") outcome = applyFailedRecall(item, now);
      if (targetType === "block" && result === "perfect") {
        item.reps = Math.max(getBlockReps(item), 1);
        recordImplicitAyahSuccess(item, now);
      }
      if (targetType === "ayah" && result === "perfect") {
        item.reps = Math.max(getAyahReps(item), 1);
      }

      const attempt = {
        targetType,
        targetId: String(targetId),
        result,
        attemptedAt: new Date(now).toISOString(),
        previousRetention,
        newRetention: item.retention || 0,
        advanced: outcome.advanced
      };

      item.attempts = Array.isArray(item.attempts) ? item.attempts : [];
      item.attempts.push(attempt);
      if (item.attempts.length > 40) item.attempts = item.attempts.slice(-40);

      if (result === "perfect" && ["due_soon", "due_now", "overdue", "decay_risk"].includes(priorDueStatus)) {
        updateStreak();
      }

      recalculate(state);
      const newlyUnlocked = unlockedSectionIds().filter(id => !previousUnlocked.includes(id));
      updateAchievements();
      saveState();

      ui.lastMessage = buildAttemptMessage(outcome, item, newlyUnlocked);
      render();
      renderChallengeResult(outcome, item, newlyUnlocked);
    }

    function buildAttemptMessage(outcome, item, newlyUnlocked) {
      const stage = item.stageName || "Not started";
      if (newlyUnlocked.length) {
        const section = state.sections[String(newlyUnlocked[0])];
        return `Section unlocked: ${section.name}. Current target is now ${item.retention}% at ${stage}.`;
      }
      if (outcome.advanced) return `Advanced to ${stage}. Next review: ${formatDue(item)}.`;
      return `Recorded. Retention remains ${item.retention || 0}% at ${stage}.`;
    }

    function recordImplicitAyahSuccess(block, now = Date.now()) {
      getAyatForBlock(block).forEach(ayah => {
        const previousRetention = ayah.retention || 0;
        const outcome = applyPerfectRecall(ayah, now);
        ayah.reps = Math.max(getAyahReps(ayah), 1);
        ayah.attempts = Array.isArray(ayah.attempts) ? ayah.attempts : [];
        ayah.attempts.push({
          targetType: "ayah",
          targetId: String(ayah.ayahNumber),
          source: "block",
          sourceId: block.id,
          result: "perfect",
          attemptedAt: new Date(now).toISOString(),
          previousRetention,
          newRetention: ayah.retention || 0,
          advanced: outcome.advanced
        });
        if (ayah.attempts.length > 40) ayah.attempts = ayah.attempts.slice(-40);
      });
    }

    function updateStreak() {
      const today = localDay();
      const last = state.streak.lastCompletedReviewDate;
      if (last === today) return;
      const yesterday = new Date(Date.now() - DAY).toLocaleDateString();
      state.streak.current = last === yesterday ? state.streak.current + 1 : 1;
      state.streak.best = Math.max(state.streak.best, state.streak.current);
      state.streak.lastCompletedReviewDate = today;
    }

    // UNLOCK ENGINE
    function calculateSectionRetention(sectionId) {
      const sectionAyat = Object.values(state.ayat).filter(item => item.sectionId === sectionId);
      const sectionBlocks = Object.values(state.blocks).filter(item => item.sectionId === sectionId);
      const avg = arr => arr.length ? arr.reduce((sum, item) => sum + (item.retention || 0), 0) / arr.length : 0;
      const avgBlocks = sectionBlocks.length ? sectionBlocks.reduce((sum, block) => sum + getBlockDisplayRetention(block), 0) / sectionBlocks.length : 0;
      return Math.round((avg(sectionAyat) * 0.7) + (avgBlocks * 0.3));
    }

    function updateSectionUnlocks() {
      const threshold = state.settings.sectionUnlockThreshold;
      for (let i = 1; i <= 5; i += 1) {
        const current = state.sections[String(i)];
        const next = state.sections[String(i + 1)];
        if (current && next && current.retention >= threshold) next.unlocked = true;
      }
    }

    function recalculate(inputState) {
      state = inputState;
      applyDecay();
      SECTIONS.forEach(section => {
        state.sections[String(section.id)].retention = calculateSectionRetention(section.id);
      });
      updateSectionUnlocks();
      updateAchievements(false);
      return state;
    }

    function unlockedSectionIds() {
      return Object.values(state.sections).filter(section => section.unlocked).map(section => section.id);
    }

    function getOverallRetention() {
      return getGlobalRetention();
    }

    function getStartedAyatAverage() {
      const started = Object.values(state.ayat).filter(item => item.stageIndex >= 0);
      if (!started.length) return 0;
      return Math.round(started.reduce((sum, item) => sum + (item.retention || 0), 0) / started.length);
    }

    function getSurahAverage() {
      const ayat = Object.values(state.ayat);
      if (!ayat.length) return 0;
      return Math.round(ayat.reduce((sum, item) => sum + (item.retention || 0), 0) / ayat.length);
    }

    function getSurahFluency() {
      const blocks = Object.values(state.blocks);
      if (!blocks.length) return 0;
      return Math.round(blocks.reduce((sum, block) => sum + (block.retention || 0), 0) / blocks.length);
    }

    function getWeakestSurahAyah() {
      const ayat = Object.values(state.ayat);
      if (!ayat.length) return null;
      return ayat.reduce((weakest, ayah) => (ayah.retention || 0) < (weakest.retention || 0) ? ayah : weakest, ayat[0]);
    }

    function getGlobalRetention() {
      const weakest = getWeakestSurahAyah();
      if (!weakest) return 0;
      return Math.min(getSurahFluency(), weakest.retention || 0);
    }

    function getRank(retention = getOverallRetention()) {
      if (retention >= 100) return "Deep Retention";
      if (retention >= 90) return "Guardian";
      if (retention >= 80) return "Anchored";
      if (retention >= 70) return "Fortified";
      if (retention >= 55) return "Preserver";
      if (retention >= 40) return "Stabilizer";
      if (retention >= 25) return "Holder";
      if (retention >= 15) return "Initiated";
      return "Seeker";
    }

    function updateAchievements(shouldSave = true) {
      const unlocked = new Set(state.unlockedAchievements || []);
      const allItems = [...Object.values(state.ayat), ...Object.values(state.blocks)];
      const hasRetention = value => allItems.some(item => (item.retention || 0) >= value);
      [
        ["First Lock", hasRetention(15)],
        ["Same-Day Hold", hasRetention(25)],
        ["1-Day Hold", hasRetention(40)],
        ["3-Day Hold", hasRetention(55)],
        ["7-Day Hold", hasRetention(70)],
        ["30-Day Hold", hasRetention(90)],
        ["Deep Retention", hasRetention(100)],
        ["First Block Stabilized", Object.values(state.blocks).some(item => getBlockDisplayRetention(item) >= 70)],
        ["First Section Unlock", Boolean(state.sections["2"]?.unlocked)]
      ].forEach(([name, achieved]) => {
        if (achieved) unlocked.add(name);
      });
      state.unlockedAchievements = [...unlocked];
      if (shouldSave) saveState();
    }

    // RENDERING
    function render() {
      const app = document.getElementById("app");
      if (ui.currentBlockId) {
        app.innerHTML = renderBlockDetail(ui.currentBlockId);
      } else {
        app.innerHTML = `
          ${renderPhoneHeader()}
          <main class="screen">
            ${renderActiveTab()}
          </main>
          ${renderTabBar()}
        `;
      }

      bindEvents();
    }

    function renderPhoneHeader() {
      return `
        <header class="ios-header">
          <div class="app-icon">📖</div>
          <div>
            <h1 class="app-title">Mutqin</h1>
            <div class="app-subtitle">متقن</div>
          </div>
        </header>
      `;
    }

    function renderActiveTab() {
      if (ui.activeTab === "recall") return renderRecallTab();
      if (ui.activeTab === "quran") return renderQuranTab();
      if (ui.activeTab === "progress") return renderProgressTab();
      if (ui.activeTab === "settings") return renderSettingsTab();
      return renderTodayTab();
    }

    function renderTodayTab() {
      const blocks = getAllOrderedBlocks();
      return `
        <h2 class="section-label"><span class="green-dot"></span>Memorization <span class="count-pill">${blocks.length}</span></h2>
        <div class="memory-list">
          ${SECTIONS.map(section => renderSectionGroup(section)).join("")}
        </div>
      `;
    }

    function renderSectionGroup(section) {
      const sectionState = state.sections[String(section.id)];
      const blocks = getAllOrderedBlocks().filter(block => block.sectionId === section.id);
      return `
        <section class="today-section">
          <div class="today-section-head">
            <strong>Section ${section.id} · ${escapeHtml(section.name)}</strong>
            <span>${sectionState.retention || 0}% · Ayat ${section.ayahRange[0]}-${section.ayahRange[1]}</span>
          </div>
          ${blocks.map(block => renderMemoryCard(block)).join("")}
        </section>
      `;
    }

    function renderMemoryCard(block) {
      const reps = getBlockReps(block);
      const target = getBlockRepTarget(block);
      const percent = Math.min(100, Math.round((reps / target) * 100));
      const displayRetention = getBlockDisplayRetention(block);
      const weakest = getWeakestAyah(block);
      const combinedStatus = getBlockCombinedStatus(block);
      const stateClass = getBlockColorState(block);
      return `
        <button class="memory-card ${stateClass}" data-open-block="${escapeHtml(block.id)}">
          <span>
            <span class="memory-title">Al-Hajj - الحج</span>
            <span class="memory-subtitle">Verses ${block.ayahRange[0]}-${block.ayahRange[1]} · ${displayRetention}% visible · ${escapeHtml(statusLabel(combinedStatus))}</span>
            <span class="memory-subtitle">Block ${block.retention || 0}% · weakest Ayah ${weakest?.ayahNumber || "-"} ${weakest?.retention || 0}%</span>
          </span>
          <span class="memory-reps">${reps}<span>/${target}</span></span>
          <span class="thin-progress" style="--w:${percent}%"><span></span></span>
        </button>
      `;
    }

    function renderBlockDetail(blockId) {
      const block = state.blocks[blockId];
      const reps = getBlockReps(block);
      const target = getBlockRepTarget(block);
      const displayRetention = getBlockDisplayRetention(block);
      const strength = displayRetention ? Math.max(1, Math.min(5, Math.ceil(displayRetention / 20))) : 0;
      const progress = Math.min(100, Math.round((reps / target) * 100));
      const stateClass = getBlockColorState(block);
      return `
        <header class="detail-header">
          <button class="back-pill" data-main>‹ Main</button>
          <div class="detail-title">Verses ${block.ayahRange[0]}-${block.ayahRange[1]} - الحج</div>
          <button class="trash-pill" data-reset-block="${escapeHtml(block.id)}">⌫</button>
        </header>
        ${renderBlockStatusRibbon(block, stateClass)}
        <main class="rep-panel">
          <div class="muted-label">Repetitions</div>
          <div class="rep-number"><strong>${reps}</strong><span>/ ${target} <button class="rep-edit" data-edit-target="${escapeHtml(block.id)}" aria-label="Edit repetition target">✎</button></span></div>
          <div class="rep-line" style="--w:${progress}%"><span></span></div>
          <div class="rep-actions">
            <button class="rep-small minus" data-rep="${escapeHtml(block.id)}" data-delta="-1">-1</button>
            <button class="rep-small plus" data-rep="${escapeHtml(block.id)}" data-delta="1">+1</button>
          </div>
          <div class="muted-label" style="margin-top:32px">Strength</div>
          <div class="strength-stars">${[1,2,3,4,5].map(i => `<span class="${i <= strength ? "lit" : ""}">☆</span>`).join("")}</div>
          ${renderBlockMemoryToggle(block, reps)}
          ${renderReviewCard(block)}
          ${renderBlockAyahList(block)}
          <div class="motto">Not speed. Solidity.</div>
        </main>
      `;
    }

    function renderBlockStatusRibbon(block, stateClass = getBlockColorState(block)) {
      return `
        <div class="block-status-ribbon ${stateClass}" aria-label="${escapeHtml(blockRibbonLabel(stateClass))}"></div>
      `;
    }

    function blockRibbonLabel(stateClass) {
      return ({
        "state-new": "Not memorized",
        "state-stable": "Memorized",
        "state-soon": "Recall soon",
        "state-needed": "Recall needed"
      })[stateClass] || "Status";
    }

    function renderReviewCard(block) {
      const isMemorized = (block.stageIndex ?? -1) >= 0;
      const weakest = getWeakestAyah(block);
      const displayRetention = getBlockDisplayRetention(block);
      const ayahAverage = getBlockAyahAverage(block);
      return `
        <section class="review-card">
          <h3>${isMemorized ? "How was the block recall?" : "Block scores"}</h3>
          ${isMemorized ? `<p class="review-hint">Recite the full block first, then choose one result.</p>` : ""}
          <div class="review-meta">
            <div><span>Visible score</span><strong>${displayRetention}%</strong></div>

    function renderRecallTab() {
      const dueStatuses = ["due_now", "overdue", "decay_risk"];

      const soonBlockRows = getRecallRows("block", soonStatuses);

      const soonCount = soonBlockRows.length + soonAyahRows.length;
      return `
        <h2 class="section-label"><span class="green-dot"></span>Recall <span class="count-pill">${dueCount}</span></h2>
        ${renderRecallSection("Due Now", `${dueCount} due`, dueBlockRows, dueAyahRows)}
        ${renderRecallSection("Coming Soon", `${soonCount} soon`, soonBlockRows, soonAyahRows)}
      `;
    }

    function renderRecallSection(title, subtitle, blockRows, ayahRows) {
      return `
        <section class="recall-section">
          <div class="recall-heading">${escapeHtml(title)} <span>${escapeHtml(subtitle)}</span></div>
          <div class="recall-subhead">Blocks</div>
          ${blockRows.length ? `<div class="recall-stack">${blockRows.map(renderRecallRow).join("")}</div>` : `<div class="recall-empty">No block recall here.</div>`}
          <div class="recall-subhead">Ayat</div>
          ${ayahRows.length ? `<div class="recall-stack">${ayahRows.map(renderRecallRow).join("")}</div>` : `<div class="recall-empty">No ayah recall here.</div>`}
        </section>
      `;
    }

    function renderRecallRow(row) {
      const item = row.item;
      const targetId = row.type === "ayah" ? item.ayahNumber : item.id;
      const title = row.type === "ayah" ? `Ayah ${item.ayahNumber}` : `Verses ${item.ayahRange[0]}-${item.ayahRange[1]}`;
      const score = row.type === "ayah" ? item.retention || 0 : item.retention || 0;
      const subtitle = row.type === "ayah"
        ? `Ayah recall · ${escapeHtml(formatDue(item))}`
        : `Block fluency · ${escapeHtml(formatDue(item))}`;
      return `
        <button class="recall-row ${getItemColorState(item)}" data-start="${row.type}" data-target="${escapeHtml(targetId)}">
          <span class="recall-kind">${row.type === "ayah" ? "A" : "B"}</span>
          <span class="recall-main">

            <span>${subtitle}</span>

    function renderDecayCard(section) {
      const items = Object.values(state.ayat).filter(item => item.sectionId === section.id);
      const dueCounts = items.reduce((acc, item) => {
        acc[getDueStatus(item)] = (acc[getDueStatus(item)] || 0) + 1;
        return acc;
      }, {});
      const risk = (dueCounts.decay_risk || 0) + (dueCounts.overdue || 0);
      const tone = risk ? "status-bad" : (dueCounts.due_soon || dueCounts.due_now) ? "status-warn" : "status-good";
      const status = risk ? `${risk} at risk` : (dueCounts.due_soon || dueCounts.due_now) ? "review soon" : "stable";
      return `
        <div class="decay-card">
          <strong>Section ${section.id} · ${escapeHtml(section.name)} <span class="${tone}">${section.retention}%</span></strong>
          <p>${section.unlocked ? "Unlocked" : "Locked"} · ${status} · Ayat ${section.ayahRange[0]}-${section.ayahRange[1]}</p>
          <div class="rep-line" style="--w:${section.retention}%"><span></span></div>
        </div>
      `;

    function renderSectionCard(section) {

      return `
        <button class="section-card ${locked ? "locked" : ""} ${active ? "active" : ""} status-${getSectionStatus(section.id)}"

      const items = Object.values(state.ayat).filter(item => item.sectionId === sectionId);

      return ranked.find(status => items.some(item => getDueStatus(item) === status)) || "future";

          <div class="block-top">
            <span>
              <span class="block-title">Block ${escapeHtml(block.id)}</span>

              <button data-reset>Reset</button>
            </div>
          </section>
        </aside>
      `;
